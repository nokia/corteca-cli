build:
  architectures:
    armv7l:
      platform: "linux/arm/v7"
    aarch64:
      platform: "linux/arm64"
    x86_64:
      platform: "linux/amd64"
  default: aarch64
  options:
    outputType: oci
    debug: false
    env:
  crossCompile:
    enabled: true
    image: multiarch/qemu-user-static
    args: ["--reset", "-p", "yes"]

sequences:
  # deployment sequences

publish:
  local:
    addr: http://0.0.0.0:8080
    method: listen

  localRegistry:
    addr: 0.0.0.0:8080
    method: registry-v2
    namespace: aarch64/${.app.name}
    reference: ${.app.version}

devices:
  # deployment devices
